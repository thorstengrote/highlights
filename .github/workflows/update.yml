name: Update Highlights

on:
  schedule:
    - cron: "*/15 4-6 * * *"  # alle 15 Min, 6–9 Uhr CEST (WM-Frühstück)
    - cron: "0 */2 * * *"     # alle 2h den Rest des Tages
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: WM 2026 Enddatum prüfen
        id: wm
        run: |
          if [[ $(date -u +%Y%m%d) -gt 20260719 ]]; then
            echo "active=false" >> $GITHUB_OUTPUT
            echo "WM 2026 ist vorbei – kein Update mehr."
          else
            echo "active=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.wm.outputs.active == 'true'

      - name: Install yt-dlp
        if: steps.wm.outputs.active == 'true'
        run: pip install -q yt-dlp

      - name: Generate index.html
        if: steps.wm.outputs.active == 'true'
        run: python3 generate.py

      - name: Commit & push if changed
        if: steps.wm.outputs.active == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "update highlights"
          git push --force-with-lease
